<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Level social share card — export to og-image.png at 1200x630, then point
       the og:image / twitter:image meta tags in index.html + about.html at it. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A2619"/>
      <stop offset="1" stop-color="#0B1210"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Faint pitch markings -->
  <g stroke="rgba(242,244,238,0.06)" stroke-width="2" fill="none">
    <rect x="40" y="40" width="1120" height="550" rx="8"/>
    <line x1="600" y1="40" x2="600" y2="590"/>
    <circle cx="600" cy="315" r="90"/>
  </g>

  <!-- Signal-lime accent bar (spirit-level nod) -->
  <rect x="90" y="150" width="120" height="14" rx="7" fill="#A4CC46"/>
  <rect x="90" y="150" width="46" height="14" rx="7" fill="#F2F4EE"/>

  <!-- Wordmark -->
  <text x="88" y="300" font-family="'Space Mono', ui-monospace, monospace" font-weight="700"
        font-size="130" fill="#F2F4EE" letter-spacing="2">Level</text>

  <!-- Headline -->
  <text x="90" y="400" font-family="'Space Mono', ui-monospace, monospace" font-weight="700"
        font-size="52" fill="#F2F4EE">Every kid plays. <tspan fill="#A4CC46">Fairly.</tspan></text>

  <!-- Subline -->
  <text x="90" y="458" font-family="'Space Mono', ui-monospace, monospace" font-weight="400"
        font-size="30" fill="rgba(242,244,238,0.72)">Fair, balanced rotation plans for grassroots youth football.</text>

  <!-- URL -->
  <text x="90" y="560" font-family="'Space Mono', ui-monospace, monospace" font-weight="700"
        font-size="28" fill="#A4CC46">keepthingslevel.com</text>
</svg>
