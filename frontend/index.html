<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#162e16" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Squad Rotation</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">

  <!-- ── Screen: Home ─────────────────────────────────────────────────────── -->
  <div id="screen-home" class="screen">
    <header class="header header-home">
      <h1 class="app-title">Squad Rotation</h1>
      <div class="home-actions">
        <button class="btn btn-primary" id="btn-go-new-match">+ New Match</button>
        <button class="btn btn-secondary" id="btn-go-squad">Edit Squad</button>
      </div>
    </header>
    <ul class="match-list" id="match-list"></ul>
  </div>

  <!-- ── Screen: New Match ────────────────────────────────────────────────── -->
  <div id="screen-new-match" class="screen" hidden>
    <header class="header header-sub">
      <button class="btn-back" id="btn-new-match-back">◀ Matches</button>
      <h2>New Match</h2>
    </header>
    <form class="form-card" id="new-match-form">
      <label>
        Opponent
        <input type="text" id="opponent-input" placeholder="e.g. Rovers FC" autocomplete="off" />
      </label>
      <label>
        Date
        <input type="date" id="match-date" />
      </label>

      <label>Team Size</label>
      <div class="size-picker" id="size-picker">
        <button type="button" class="size-btn" data-size="5">5v5</button>
        <button type="button" class="size-btn" data-size="6">6v6</button>
        <button type="button" class="size-btn" data-size="7">7v7</button>
        <button type="button" class="size-btn" data-size="9">9v9</button>
        <button type="button" class="size-btn" data-size="11">11v11</button>
      </div>

      <label>
        Formation
        <select id="formation-select"></select>
      </label>

      <label>
        Playing Time
        <div class="fairness-row">
          <span class="fairness-label">Equal</span>
          <input type="range" id="fairness-slider" min="0" max="100" step="1" value="0" />
          <span class="fairness-label">Competitive</span>
        </div>
        <div class="fairness-value" id="fairness-value">Equal play</div>
      </label>

      <button class="btn btn-primary btn-full" type="submit" id="btn-generate">
        Generate Rotation ▶
      </button>
    </form>
  </div>

  <!-- ── Screen: Squad ────────────────────────────────────────────────────── -->
  <div id="screen-squad" class="screen" hidden>
    <header class="header header-sub">
      <button class="btn-back" id="btn-squad-back">◀ Matches</button>
      <h2>Squad</h2>
    </header>
    <ul class="player-list" id="player-list"></ul>
    <div class="squad-footer">
      <button class="btn btn-primary btn-full" id="btn-add-player">+ Add Player</button>
    </div>

    <!-- Add / Edit player form -->
    <div class="form-overlay" id="player-form" hidden>
      <form class="form-card">
        <h3 id="form-title">Add Player</h3>
        <label>
          Name
          <input type="text" id="input-name" placeholder="Player name" autocomplete="off" required />
        </label>

        <label>Can Play</label>
        <div class="position-checkboxes" id="position-checkboxes">
          <label class="pos-check"><input type="checkbox" value="GK" /><span class="pos-label pos-gk">GK</span></label>
          <label class="pos-check"><input type="checkbox" value="DEF" /><span class="pos-label pos-def">DEF</span></label>
          <label class="pos-check"><input type="checkbox" value="MID" /><span class="pos-label pos-mid">MID</span></label>
          <label class="pos-check"><input type="checkbox" value="FWD" /><span class="pos-label pos-fwd">FWD</span></label>
        </div>

        <label>
          Best Position
          <select id="input-best-position">
            <option value="">Not set</option>
          </select>
        </label>

        <label>
          Skill Rating (1–5)
          <input type="number" id="input-skill" min="1" max="5" value="3" />
        </label>

        <div class="form-actions">
          <button class="btn btn-secondary" type="button" id="btn-cancel-player">Cancel</button>
          <button class="btn btn-primary" type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Screen: Pitch ────────────────────────────────────────────────────── -->
  <div id="screen-pitch" class="screen" hidden>

    <header class="header">
      <div class="header-top">
        <button class="btn-back" id="btn-pitch-back">◀ Matches</button>
        <div class="match-title" id="match-title"></div>
      </div>
      <div class="slot-label"  id="slot-label"></div>
      <div class="slot-counter" id="slot-counter"></div>
      <div class="progress-dots" id="progress-dots"></div>
    </header>

    <div class="pitch-wrapper">
      <div class="pitch" id="pitch"></div>
    </div>

    <section class="report-section" id="report-section" style="display:none">
      <ul class="report-list" id="report-list"></ul>
    </section>

    <section class="bench-section">
      <div class="bench-title">Bench</div>
      <ul class="bench-list" id="bench-list"></ul>
    </section>

    <div class="controls">
      <button class="btn btn-prev" id="btn-prev">◀ Back</button>
      <button class="btn btn-next" id="btn-next">Next ▶</button>
    </div>

  </div><!-- /screen-pitch -->

</div><!-- /app -->

<script type="module" src="app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js");
  }
</script>
</body>
</html>
