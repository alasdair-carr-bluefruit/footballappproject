services:
  - type: web
    name: football-rotation
    env: python
    buildCommand: pip install -e ".[api]"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/football.db
      - key: PYTHON_VERSION
        value: "3.12"
